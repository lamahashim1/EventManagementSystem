{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>NU Tech | Event Committee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="{% static 'media/favicon.ico' type='image/x-icon' %}">
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url("{% static 'media/nirma_bck.jpg' %}");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
        }
        .auth-box-title {
            color: #2c3e50;
            font-weight: 700;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-link {
            background-color: #074d32;
            color: white!important;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
        }
        .auth-link:hover {
            background-color: #053a24;
            color: white;
            transform: translateY(-2px);
        }
        .homepage-link {
            background-color: #6c757d;
            color: white!important;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .homepage-link:hover {
            background-color: #5a6268;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="auth-box">
                <h1 class="auth-box-title">Event Committee</h1>
                
                <div class="d-flex flex-column gap-3 mb-4">
                    <a href="{% url 'admin_login' %}" class="auth-link">Admin Login</a>
                    <a href="{% url 'coordinator_login' %}" class="auth-link">Coordinator Login</a>
                    <a href="{% url 'eventHead_login' %}" class="auth-link">Event Head Login</a>
                </div>

                <div class="text-center">
                    <a href="eventCommitteeRegForm" class="auth-link d-inline-block">Register New Committee</a>
                </div>

                <div class="text-center mt-4">
                    <a href="{% url 'homepage' %}" class="homepage-link">Back to Homepage</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
