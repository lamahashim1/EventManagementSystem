{% extends 'Coordinator/coordinator_base.html' %}

{% load static %}

{% block title %}
<title>Coordinator | DashBoard</title>
{% endblock %}

{% block loadcss %}
<link rel="stylesheet" type="text/css" href="{% static 'css/Coordinator/coordinator_dashboard.css' %}">
<style>
    body {
        background-color: url("{% static 'media/bck_p_dash.jfif' %}");
        background-size: cover;
        background-position: center center;
    }

    #eventhead {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #section_title {
        color: #2c3e50;
        font-weight: 700;
        margin-bottom: 2rem;
        text-align: center;
    }

    .menu {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .item {
        list-style: none;
        margin-bottom: 1rem;
    }

    .btn {
        display: block;
        background-color: #074d32;
        color: white;
        padding: 12px 20px;
        font-size: 1.1rem;
        border-radius: 5px;
        text-align: center;
        text-decoration: none;
        transition: background-color 0.3s ease;
    }

    .btn:hover {
        background-color: #2980b9;
    }

    .messages {
        background-color: #f4f6f6;
        padding: 1rem;
        border-radius: 5px;
        margin-bottom: 2rem;
    }

    .messages li {
        padding: 8px 10px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    @media (max-width: 768px) {
        #dashboard {
            padding: 1rem;
            width: 100%;
        }

        .btn {
            font-size: 1rem;
            padding: 10px 15px;
        }
    }
</style>
{% endblock %}
