{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Event Head Login | NUTECH-2020</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url("{% static 'media/nirma_bck.jpg' %}");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
        }
        .auth-box-title {
            color: #2c3e50;
            font-weight: 700;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #074d32;
        }
        .btn-primary {
            background-color: #074d32;
            border: none;
            padding: 12px 0;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #053a24;
        }
        .back-link {
            color: #074d32;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            color: #053a24;
        }
        .demo-credentials {
            font-size: 0.9rem;
            color: #6c757d;
            text-align: center;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="auth-box">
                <h1 class="auth-box-title">Event Head Login</h1>

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control" id="email" name="email" 
                               placeholder="name@example.com" 
                               value="{% if email %}{{ email }}{% else %}head.user@gmail.com{% endif %}" 
                               required>
                        <label for="email">Email address</label>
                    </div>
                    
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Password" 
                               value="admin" 
                               required>
                        <label for="password">Password</label>
                    </div>

                    <div class="demo-credentials">
                        Default credentials for demo purposes
                    </div>

                    {% if message %}
                    <div class="alert alert-danger" role="alert">
                        {{ message }}
                    </div>
                    {% endif %}

                    <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
                    
                    <div class="text-center">
                        <a href="{% url 'eventCommittee' %}" class="back-link">← Back to Administrative Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
